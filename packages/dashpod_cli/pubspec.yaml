name: dashpod_cli
description: Developer-side CLI for Dashpod code-push (init, release, patch, …).
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.8.1

resolution: workspace

dependencies:
  args: ^2.5.0
  cli_util: ^0.4.1
  dio: ^5.7.0
  meta: ^1.16.0
  path: ^1.9.0
  openid_client: ^0.4.9
  yaml: ^3.1.3
  yaml_edit: ^2.2.0

  dashpod_api:
    path: ../dashpod_api

dev_dependencies:
  lints: ^6.0.0
  test: ^1.24.0