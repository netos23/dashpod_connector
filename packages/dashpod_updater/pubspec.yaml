name: dashpod_updater
description: Check for and download Dashpod over-the-air code-push updates from your app.
version: 0.1.0
# repository: https://github.com/my_org/my_repo

environment:
  sdk: ^3.8.1

resolution: workspace

dependencies:
  ffi: ^2.1.0
  meta: ^1.9.1

dev_dependencies:
  ffigen: ">=11.0.0 <21.0.0"
  lints: ^6.0.0
  mocktail: ^1.0.0
  test: ^1.24.0

ffigen:
  output: "lib/src/generated/updater_bindings.g.dart"
  name: "UpdaterBindings"
  description: "Dart-stable FFI bindings to the dashpod updater C ABI."
  headers:
    # Only the Dart-stable surface drives ffigen. Engine-only symbols live in
    # ../../updater/include/dashpod/engine.h and must NOT be reachable from the
    # generated bindings — the package's public ABI is exactly what this file
    # exposes.
    entry-points:
      - "../../updater/include/dashpod/dart.h"
    include-directives:
      - ".*/dashpod/dart.h"
      - ".*/dashpod/export.h"
  preamble: |
    // ignore_for_file: unused_element, unused_field, camel_case_types, constant_identifier_names, non_constant_identifier_names